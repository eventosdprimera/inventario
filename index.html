<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario - Eventos D' Primera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .marca-agua {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
        }

        .marca-agua img {
            max-width: 70%;
            max-height: 70%;
            object-fit: contain;
        }

        .login-container {
            background-color: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            border-top: 5px solid #1e3a8a;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            max-width: 140px;
            height: auto;
            margin-bottom: 15px;
        }

        .titulo-sistema {
            font-family: 'Cormorant Garamond', serif;
            color: #1e3a8a;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .subtitulo-sistema {
            color: #6b7280;
            text-align: center;
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 35px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            color: #374151;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background-color: #f9fafb;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1e3a8a;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.3);
            font-family: 'Poppins', sans-serif;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 58, 138, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .mensaje {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .mensaje.error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            display: block;
        }

        .mensaje.exito {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
            display: block;
        }

        .seguridad-info {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .seguridad-texto {
            color: #6b7280;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .seguridad-icono {
            font-size: 14px;
        }

        .copyright {
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
            font-size: 11px;
            line-height: 1.6;
        }

        .copyright strong {
            color: #6b7280;
            font-weight: 600;
            font-size: 12px;
            display: block;
            margin-bottom: 2px;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 40px 30px;
            }

            .titulo-sistema {
                font-size: 24px;
            }

            .subtitulo-sistema {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="marca-agua">
        <img src="img/fondo.png" alt="Marca de agua">
    </div>
    
    <div class="login-container">
        <div class="logo-container">
            <img src="img/logo.png" alt="Logo" class="logo">
            <h1 class="titulo-sistema">Sistema de Inventario<br>Eventos D' Primera</h1>
            <p class="subtitulo-sistema">Sistema Automatizado / Acceso Restringido</p>
        </div>
        
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email">Usuario (Email)</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">Iniciar Sesión</button>
            
            <div id="mensaje" class="mensaje"></div>
        </form>

        <div class="seguridad-info">
            <p class="seguridad-texto">
                <span class="seguridad-icono">🔒</span>
                Seguridad de Extremo a Extremo
            </p>
        </div>

        <div class="copyright">
            <strong>©Copyright Eventos de Primera</strong>
            2026-2027 | Versión 0.1
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
