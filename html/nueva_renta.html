<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva Renta - Eventos D' Primera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ============================================
   BANNER NÚMERO DE RENTA - DISEÑO INSTITUCIONAL
   ============================================ */
.renta-banner {
  background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #1e3a8a 100%);
  border-radius: 16px;
  padding: 35px 45px;
  margin-bottom: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  overflow: hidden;
  box-shadow: 
    0 10px 30px rgba(30, 58, 138, 0.3),
    0 4px 10px rgba(0, 0, 0, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

/* Círculos decorativos de fondo */
.renta-banner::before {
  content: '';
  position: absolute;
  top: -60%;
  right: -5%;
  width: 280px;
  height: 280px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 50%;
}

.renta-banner::after {
  content: '';
  position: absolute;
  bottom: -50%;
  left: 15%;
  width: 200px;
  height: 200px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 50%;
}

/* Línea decorativa superior */
.renta-banner-line {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, 
    transparent 0%, 
    rgba(255,255,255,0.3) 20%, 
    rgba(255,255,255,0.6) 50%, 
    rgba(255,255,255,0.3) 80%, 
    transparent 100%);
}

/* Contenido del banner */
.renta-banner-content {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}

/* Sección izquierda: Número de Renta */
.renta-banner-left {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.renta-banner-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: rgba(255, 255, 255, 0.85);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.renta-banner-label::before {
  content: '';
  width: 8px;
  height: 8px;
  background: #10b981;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.2); }
}

.renta-banner-number {
  font-size: 42px;
  font-weight: 700;
  color: white;
  font-family: 'Courier New', monospace;
  letter-spacing: 4px;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
  line-height: 1;
}

/* Separador vertical */
.renta-banner-divider {
  width: 2px;
  height: 60px;
  background: linear-gradient(180deg, 
    transparent 0%, 
    rgba(255,255,255,0.3) 20%, 
    rgba(255,255,255,0.5) 50%, 
    rgba(255,255,255,0.3) 80%, 
    transparent 100%);
  margin: 0 30px;
}

/* Sección derecha: Fecha de Emisión */
.renta-banner-right {
  display: flex;
  flex-direction: column;
  gap: 8px;
  text-align: right;
}

.renta-banner-date-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: rgba(255, 255, 255, 0.85);
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
}

.renta-banner-date-label::before {
  content: '📅';
  font-size: 14px;
}

.renta-banner-date-value {
  font-size: 20px;
  font-weight: 600;
  color: white;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  line-height: 1;
}

/* Responsive */
@media (max-width: 768px) {
  .renta-banner {
    padding: 25px 20px;
  }
  
  .renta-banner-content {
    flex-direction: column;
    gap: 20px;
    text-align: center;
  }
  
  .renta-banner-left {
    align-items: center;
  }
  
  .renta-banner-right {
    text-align: center;
    align-items: center;
  }
  
  .renta-banner-label,
  .renta-banner-date-label {
    justify-content: center;
  }
  
  .renta-banner-number {
    font-size: 32px;
  }
  
  .renta-banner-divider {
    width: 60px;
    height: 2px;
    margin: 0;
  }
}
</style>
</head>
<body>

<!-- ============================================
     CONTENEDOR PRINCIPAL
     ============================================ -->
<div class="container">

  <!-- ============================================
       BANNER NÚMERO DE RENTA
       ============================================ -->
  <div class="renta-banner">
    <div class="renta-banner-line"></div>
    
    <div class="renta-banner-content">
      <!-- IZQUIERDA: Número de Renta -->
      <div class="renta-banner-left">
        <div class="renta-banner-label">Número de Renta</div>
        <div class="renta-banner-number" id="numeroRenta">RENT-2026-0001</div>
      </div>
      
      <!-- SEPARADOR -->
      <div class="renta-banner-divider"></div>
      
      <!-- DERECHA: Fecha de Emisión -->
      <div class="renta-banner-right">
        <div class="renta-banner-date-label">Fecha de Emisión</div>
        <div class="renta-banner-date-value" id="fechaEmision">14 de julio de 2026</div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/nueva_renta.js"></script>
</body>
</html>
