<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rentas Terminadas - Eventos D' Primera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
.btn-volver-hist {
  background: linear-gradient(135deg, #6b7280 0%, #9ca3af 100%);
  color: white;
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.3s;
  margin-bottom: 20px;
}
.btn-volver-hist:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(107,114,128,0.3);
}
.btn-imprimir-term {
  background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
  color: white;
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.3s;
}
.btn-imprimir-term:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(30,58,138,0.3);
}
.terminada-badge {
  background: #3b82f6;
  color: white;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
}
.anticipada {
  color: #10b981;
  font-weight: 600;
}
.retrasada {
  color: #ef4444;
  font-weight: 600;
}
.a-tiempo {
  color: #6b7280;
  font-weight: 600;
}
</style>
</head>
<body>

<div class="container">
  <div class="page-header">
    <h1 class="page-title"> Rentas Terminadas</h1>
    <p class="page-subtitle">Historial de rentas completadas y recibidas</p>
  </div>

  <div id="mensaje" class="mensaje"></div>

  <!-- BOTÓN VOLVER -->
  <button type="button" class="btn-volver-hist" onclick="volverAlHistorial()">
    ← Volver al Historial de Rentas
  </button>

  <!-- SECCIÓN 1: BÚSQUEDA Y FILTROS -->
  <fieldset>
    <legend>🔍 Búsqueda y Filtros</legend>
    
    <div class="form-grid-registro">
      <div class="form-group-registro">
        <label>Buscar por Cliente</label>
        <input type="text" id="filtroClienteTerm" placeholder="Nombre del cliente...">
      </div>
      <div class="form-group-registro">
        <label>Buscar por Número de Renta</label>
        <input type="text" id="filtroNumeroTerm" placeholder="Ej: RENT-2026-0001">
      </div>
      <div class="form-group-registro">
        <label>Fecha Terminación Desde</label>
        <input type="date" id="filtroFechaDesdeTerm">
      </div>
      <div class="form-group-registro">
        <label>Fecha Terminación Hasta</label>
        <input type="date" id="filtroFechaHastaTerm">
      </div>
    </div>

    <div style="margin-top: 15px; display: flex; gap: 10px;">
      <button type="button" class="btn-action btn-primary" onclick="buscarRentasTerminadas()"> Buscar</button>
      <button type="button" class="btn-action btn-secondary" onclick="limpiarFiltrosTerminadas()">Limpiar Filtros</button>
    </div>
  </fieldset>

  <!-- SECCIÓN 2: LISTA DE RENTAS TERMINADAS -->
  <fieldset id="fieldsetListaTerm">
    <legend>📋 Rentas Terminadas (<span id="totalTerminadas">0</span>)</legend>
    
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th style="width: 50px;">#</th>
            <th>N° Renta</th>
            <th>Cliente</th>
            <th>Fecha Inicio</th>
            <th>Fecha Programada</th>
            <th>Fecha Real</th>
            <th style="width: 100px;">Estado Entrega</th>
            <th style="width: 100px; text-align: right;">Total</th>
            <th style="width: 80px;"></th>
          </tr>
        </thead>
        <tbody id="tbodyTerminadas">
          <tr>
            <td colspan="9" style="text-align: center; padding: 40px; color: #6b7280;">
              <div style="font-size: 40px; margin-bottom: 10px;"></div>
              <div>Realice una búsqueda para ver las rentas terminadas</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="paginacionTerm" style="margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px;">
    </div>
  </fieldset>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/rentas_terminadas.js"></script>
</body>
</html>
