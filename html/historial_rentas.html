<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Rentas - Eventos D' Primera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">📜 Historial de Rentas</h1>
    <p class="page-subtitle">Gestione las rentas activas y vencidas</p>
  </div>

  <div id="mensaje" class="mensaje"></div>

  <!-- BOTÓN VER RENTAS TERMINADAS -->
  <fieldset>
    <legend>📋 Rentas Terminadas</legend>
    <div class="button-group" style="justify-content: center;">
      <button type="button" class="btn-action btn-primary" onclick="verRentasTerminadas()">
        📋 Ver Rentas Terminadas
      </button>
    </div>
  </fieldset>

  <!-- SECCIÓN 1: BÚSQUEDA Y FILTROS -->
  <fieldset>
    <legend>🔍 Búsqueda y Filtros</legend>
    
    <div class="form-grid-registro">
      <div class="form-group-registro">
        <label>Buscar por Cliente</label>
        <input type="text" id="filtroClienteHist" placeholder="Nombre del cliente...">
      </div>
      <div class="form-group-registro">
        <label>Buscar por Número de Renta</label>
        <input type="text" id="filtroNumeroHist" placeholder="Ej: RENT-2026-0001">
      </div>
      <div class="form-group-registro">
        <label>Fecha Desde</label>
        <input type="date" id="filtroFechaDesdeHist">
      </div>
      <div class="form-group-registro">
        <label>Fecha Hasta</label>
        <input type="date" id="filtroFechaHastaHist">
      </div>
    </div>

    <div class="button-group" style="margin-top: 15px;">
      <button type="button" class="btn-action btn-primary" onclick="buscarRentasHistorial()">🔎 Buscar</button>
      <button type="button" class="btn-action btn-secondary" onclick="limpiarFiltrosHistorial()">🧹 Limpiar Filtros</button>
    </div>
  </fieldset>

  <!-- SECCIÓN 2: LISTA DE RENTAS -->
  <fieldset id="fieldsetListaHist">
    <legend>📋 Rentas Activas y Vencidas</legend>
    
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th style="width: 50px;">#</th>
            <th>N° Renta</th>
            <th>Cliente</th>
            <th>Fecha Inicio</th>
            <th>Fecha Devolución</th>
            <th style="width: 80px;">Estado</th>
            <th style="width: 100px; text-align: right;">Total</th>
            <th style="width: 220px;">Acciones</th>
          </tr>
        </thead>
        <tbody id="tbodyRentasHist">
          <tr>
            <td colspan="8" style="text-align: center; padding: 40px; color: #6b7280;">
              <div style="font-size: 40px; margin-bottom: 10px;">📭</div>
              <div>Realice una búsqueda para ver las rentas</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="paginacionHist" style="margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px;">
    </div>
  </fieldset>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/historial_rentas.js"></script>
</body>
</html>
