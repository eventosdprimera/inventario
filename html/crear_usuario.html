<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear Usuario - Eventos D' Primera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  
  .container { max-width: 1000px; margin: 0 auto; padding: 30px; font-family: 'Poppins', sans-serif; }
  
  .page-header { text-align: center; margin-bottom: 35px; }
  .page-title { font-family: 'Libre Caslon Text', serif; color: #1e3a8a; font-size: 32px; margin: 0; font-weight: 700; }
  .page-subtitle { color: #6b7280; font-size: 15px; margin-top: 8px; }
  
  fieldset { border: 1px solid #d1d5db; border-radius: 10px; padding: 30px; margin-bottom: 25px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  fieldset legend { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: white; padding: 10px 24px; border-radius: 20px; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
  
  .mensaje { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: 600; display: none; }
  .mensaje.exito { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; display: block; }
  .mensaje.error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; display: block; }
  
  /* SECCIÓN DE FOTO */
  .foto-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 35px;
    padding: 30px;
    background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
    border-radius: 12px;
    border: 2px dashed #d1d5db;
  }
  
  .foto-recuadro {
    width: 200px;
    height: 200px;
    border-radius: 12px;
    border: 3px dashed #1e3a8a;
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    overflow: hidden;
    position: relative;
    box-shadow: 0 4px 12px rgba(30, 58, 138, 0.1);
  }
  
  .foto-recuadro:hover {
    background: #eff6ff;
    border-color: #3b82f6;
    transform: scale(1.03);
    box-shadow: 0 6px 16px rgba(30, 58, 138, 0.2);
  }
  
  .foto-recuadro img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .foto-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #9ca3af;
  }
  
  .foto-placeholder-icon { font-size: 64px; margin-bottom: 10px; }
  .foto-placeholder-text { font-size: 14px; font-weight: 600; }
  
  .foto-botones {
    display: flex;
    gap: 15px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  
  /* BOTONES */
  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  
  .btn-subir { background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%); color: white; }
  .btn-subir:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(107, 114, 128, 0.3); }
  
  .btn-camara { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: white; }
  .btn-camara:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3); }
  
  .btn-eliminar { background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%); color: white; }
  .btn-eliminar:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3); }
  
  .btn-limpiar { background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%); color: white; }
  .btn-limpiar:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(107, 114, 128, 0.3); }
  
  .btn-crear { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
  .btn-crear:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3); }
  
  /* FORMULARIO */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  
  .form-group {
    display: flex;
    flex-direction: column;
  }
  
  .form-group.full-width {
    grid-column: 1 / -1;
  }
  
  .form-group label {
    font-size: 13px;
    font-weight: 700;
    color: #374151;
    margin-bottom: 8px;
  }
  
  .form-group input,
  .form-group select {
    padding: 12px 14px;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    transition: all 0.3s;
    background: white;
  }
  
  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: #1e3a8a;
    box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
  }
  
  .required { color: #ef4444; }
  
  /* BARRA DE FORTALEZA */
  .password-strength-container { margin-top: 10px; }
  .password-strength-bar-container { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .password-strength-bar { height: 100%; width: 0%; transition: all 0.3s; border-radius: 4px; }
  .password-strength-text { font-size: 12px; font-weight: 600; }
  
  .strength-weak { background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%); width: 33%; }
  .strength-medium { background: linear-gradient(90deg, #f59e0b 0%, #d97706 100%); width: 66%; }
  .strength-strong { background: linear-gradient(90deg, #10b981 0%, #059669 100%); width: 100%; }
  
  /* BOTONES DE ACCIÓN */
  .button-group {
    display: flex;
    gap: 15px;
    margin-top: 30px;
    justify-content: flex-end;
    padding-top: 25px;
    border-top: 2px solid #e5e7eb;
  }
  
  /* MODAL CÁMARA */
  .modal-camara {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.9);
    z-index: 999999;
    align-items: center;
    justify-content: center;
  }
  
  .modal-camara-content {
    background: white;
    padding: 30px;
    border-radius: 16px;
    max-width: 90%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  
  .modal-camara-content video {
    width: 100%;
    max-width: 500px;
    border-radius: 8px;
    background: #000;
  }
  
  @media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .foto-recuadro { width: 180px; height: 180px; }
    .foto-botones { flex-direction: column; align-items: center; }
    .button-group { justify-content: center; flex-direction: column; }
    .btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <h1 class="page-title">👤 Crear Nuevo Usuario</h1>
    <p class="page-subtitle">Registra un nuevo usuario con sus credenciales y rol en el sistema</p>
  </div>

  <div id="mensaje" class="mensaje"></div>

  <fieldset>
    <legend> Datos del Usuario</legend>
    
    <!-- SECCIÓN DE FOTO -->
    <div class="foto-section">
      <div class="foto-recuadro" id="fotoRecuadro" onclick="document.getElementById('inputFoto').click()" title="Clic para subir foto">
        <div class="foto-placeholder" id="fotoPlaceholder">
          <div class="foto-placeholder-icon">📷</div>
          <div class="foto-placeholder-text">Clic para agregar foto</div>
        </div>
        <img id="fotoPreview" src="" alt="Foto de perfil" style="display: none;">
      </div>
      
      <div class="foto-botones">
        <button type="button" class="btn btn-subir" onclick="document.getElementById('inputFoto').click()">
          📁 Subir Archivo
        </button>
        <button type="button" class="btn btn-camara" onclick="abrirCamara()">
          📷 Tomar Foto
        </button>
        <button type="button" class="btn btn-eliminar" id="btnEliminarFoto" onclick="eliminarFoto()" style="display: none;">
          🗑️ Eliminar
        </button>
      </div>
      
      <input type="file" id="inputFoto" accept="image/*" style="display: none;" onchange="previsualizarFoto(event)">
    </div>

    <!-- FORMULARIO -->
    <div class="form-grid">
      <div class="form-group">
        <label>Nombres <span class="required">*</span></label>
        <input type="text" id="usuarioNombre" placeholder="Ej: Juan Carlos">
      </div>
      
      <div class="form-group">
        <label>Apellidos <span class="required">*</span></label>
        <input type="text" id="usuarioApellido" placeholder="Ej: Pérez García">
      </div>
      
      <div class="form-group">
        <label>Cédula de Identidad <span class="required">*</span></label>
        <input type="text" id="usuarioCedula" placeholder="Ej: 12345678" maxlength="10">
      </div>
      
      <div class="form-group">
        <label>Correo Electrónico <span class="required">*</span></label>
        <input type="email" id="usuarioEmail" placeholder="usuario@ejemplo.com">
      </div>
      
      <div class="form-group">
        <label>Contraseña <span class="required">*</span></label>
        <input type="password" id="usuarioPassword" placeholder="Mínimo 6 caracteres" minlength="6" oninput="verificarFortalezaPassword()">
        <div class="password-strength-container">
          <div class="password-strength-bar-container">
            <div class="password-strength-bar" id="passwordStrengthBar"></div>
          </div>
          <div class="password-strength-text" id="passwordStrengthText"></div>
        </div>
      </div>
      
      <div class="form-group">
        <label>Repetir Contraseña <span class="required">*</span></label>
        <input type="password" id="usuarioPasswordConfirm" placeholder="Repita la contraseña" minlength="6">
      </div>
      
      <div class="form-group full-width">
        <label>Rol en el Sistema <span class="required">*</span></label>
        <select id="usuarioRol">
          <option value="consultor">👁️ Consultor (Solo lectura)</option>
          <option value="moderador">⚙️ Moderador (Gestión operativa)</option>
          <option value="administrador">👑 Administrador (Control total)</option>
        </select>
      </div>
    </div>

    <!-- BOTONES -->
    <div class="button-group">
      <button type="button" class="btn btn-limpiar" onclick="limpiarFormulario()">🔄 Limpiar</button>
      <button type="button" class="btn btn-crear" onclick="crearUsuario()" id="btnCrearUsuario">💾 Crear Usuario</button>
    </div>
  </fieldset>
</div>

<!-- MODAL DE CÁMARA -->
<div class="modal-camara" id="modalCamara">
  <div class="modal-camara-content">
    <h3 style="margin: 0 0 15px 0; color: #1e3a8a; font-family: 'Libre Caslon Text', serif;"> Tomar Foto de Perfil</h3>
    <video id="videoCamara" autoplay playsinline></video>
    <canvas id="canvasCamara" style="display: none;"></canvas>
    <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
      <button type="button" class="btn btn-crear" onclick="capturarFotoCamara()">📸 Capturar</button>
      <button type="button" class="btn btn-limpiar" onclick="cerrarCamara()">❌ Cancelar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/crear_usuario.js"></script>
</body>
</html>
