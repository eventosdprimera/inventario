<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes - Eventos D' Primera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Chart.js se cargará dinámicamente desde el dashboard, pero lo dejamos por si se abre directo -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
  <div class="page-header">
    <h1 class="page-title">📊 Reportes y Estadísticas</h1>
    <p class="page-subtitle">Resumen general del estado del inventario y las rentas en tiempo real</p>
  </div>

  <!-- TARJETAS DE ESTADÍSTICAS NUMÉRICAS -->
  <div class="stats-grid">
    <div class="stat-card total">
      <span class="stat-icon">📦</span>
      <div class="stat-value" id="statTotalEquipos">0</div>
      <div class="stat-label">Total Equipos</div>
    </div>
    <div class="stat-card activos">
      <span class="stat-icon">✅</span>
      <div class="stat-value" id="statActivos">0</div>
      <div class="stat-label">Activos</div>
    </div>
    <div class="stat-card inoperativos">
      <span class="stat-icon">⚠️</span>
      <div class="stat-value" id="statInoperativos">0</div>
      <div class="stat-label">Inoperativos</div>
    </div>
    <div class="stat-card rentados">
      <span class="stat-icon">🤝</span>
      <div class="stat-value" id="statRentados">0</div>
      <div class="stat-label">Rentados</div>
    </div>
    <div class="stat-card averiados">
      <span class="stat-icon">🔧</span>
      <div class="stat-value" id="statAveriados">0</div>
      <div class="stat-label">Averiados</div>
    </div>
    <div class="stat-card vendidos">
      <span class="stat-icon">💰</span>
      <div class="stat-value" id="statVendidos">0</div>
      <div class="stat-label">Vendidos</div>
    </div>
    <div class="stat-card rentas-creadas">
      <span class="stat-icon">📝</span>
      <div class="stat-value" id="statRentasCreadas">0</div>
      <div class="stat-label">Rentas Creadas</div>
    </div>
    <div class="stat-card rentas-terminadas">
      <span class="stat-icon">🏁</span>
      <div class="stat-value" id="statRentasTerminadas">0</div>
      <div class="stat-label">Rentas Terminadas</div>
    </div>
    <div class="stat-card rentas-vencidas">
      <span class="stat-icon">⏰</span>
      <div class="stat-value" id="statRentasVencidas">0</div>
      <div class="stat-label">Rentas Vencidas</div>
    </div>
  </div>

  <!-- GRÁFICOS VISUALES -->
  <div class="charts-grid">
    <div class="chart-container">
      <div class="chart-title">📦 Distribución del Inventario</div>
      <div class="chart-canvas-wrapper">
        <canvas id="chartEquipos"></canvas>
      </div>
    </div>
    <div class="chart-container">
      <div class="chart-title">🤝 Estado de las Rentas</div>
      <div class="chart-canvas-wrapper">
        <canvas id="chartRentas"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/reportes.js"></script>
</body>
</html>
