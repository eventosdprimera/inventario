<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes - Eventos D' Primera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  .container { max-width: 1200px; margin: 0 auto; padding: 30px; }
  .page-header { text-align: center; margin-bottom: 30px; }
  .page-title { font-family: 'Libre Caslon Text', serif; color: #1e3a8a; font-size: 28px; margin: 0; }
  .page-subtitle { color: #6b7280; font-size: 14px; margin-top: 5px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-left: 5px solid #1e3a8a; transition: transform 0.2s; }
  .stat-card:hover { transform: translateY(-3px); }
  .stat-icon { font-size: 32px; margin-bottom: 10px; }
  .stat-value { font-size: 36px; font-weight: 700; color: #1e3a8a; margin: 5px 0; }
  .stat-label { font-size: 12px; color: #6b7280; font-weight: 600; text-transform: uppercase; }
  .stat-card.total { border-left-color: #3b82f6; }
  .stat-card.activos { border-left-color: #10b981; }
  .stat-card.inoperativos { border-left-color: #6b7280; }
  .stat-card.rentados { border-left-color: #f59e0b; }
  .stat-card.averiados { border-left-color: #ef4444; }
  .stat-card.vendidos { border-left-color: #8b5cf6; }
  .stat-card.rentas-creadas { border-left-color: #3b82f6; }
  .stat-card.rentas-terminadas { border-left-color: #10b981; }
  .stat-card.rentas-vencidas { border-left-color: #ef4444; }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; }
  .chart-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  .chart-title { font-size: 16px; font-weight: 600; color: #374151; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #f3f4f6; padding-bottom: 10px; }
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <h1 class="page-title">📊 Reportes y Estadísticas</h1>
    <p class="page-subtitle">Resumen general del estado del inventario y las rentas en tiempo real</p>
  </div>
  <div class="stats-grid">
    <div class="stat-card total"><div class="stat-icon">📦</div><div class="stat-value" id="statTotalEquipos">0</div><div class="stat-label">Total Equipos</div></div>
    <div class="stat-card activos"><div class="stat-icon">✅</div><div class="stat-value" id="statActivos">0</div><div class="stat-label">Activos</div></div>
    <div class="stat-card inoperativos"><div class="stat-icon">⚠️</div><div class="stat-value" id="statInoperativos">0</div><div class="stat-label">Inoperativos</div></div>
    <div class="stat-card rentados"><div class="stat-icon">🤝</div><div class="stat-value" id="statRentados">0</div><div class="stat-label">Rentados</div></div>
    <div class="stat-card averiados"><div class="stat-icon">🔧</div><div class="stat-value" id="statAveriados">0</div><div class="stat-label">Averiados</div></div>
    <div class="stat-card vendidos"><div class="stat-icon">💰</div><div class="stat-value" id="statVendidos">0</div><div class="stat-label">Vendidos</div></div>
    <div class="stat-card rentas-creadas"><div class="stat-icon">📝</div><div class="stat-value" id="statRentasCreadas">0</div><div class="stat-label">Rentas Creadas</div></div>
    <div class="stat-card rentas-terminadas"><div class="stat-icon">🏁</div><div class="stat-value" id="statRentasTerminadas">0</div><div class="stat-label">Rentas Terminadas</div></div>
    <div class="stat-card rentas-vencidas"><div class="stat-icon">⏰</div><div class="stat-value" id="statRentasVencidas">0</div><div class="stat-label">Rentas Vencidas</div></div>
  </div>
  <div class="charts-grid">
    <div class="chart-container"><div class="chart-title">📦 Distribución del Inventario</div><canvas id="chartEquipos"></canvas></div>
    <div class="chart-container"><div class="chart-title">🤝 Estado de las Rentas</div><canvas id="chartRentas"></canvas></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/reportes.js"></script>
</body>
</html>
